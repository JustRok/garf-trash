<script>
  // Aggressive memory management to prevent browser tab unloading
  let memoryWarningShown = false;
  
  // Monitor and cleanup memory aggressively
  setInterval(() => {
    if (performance.memory) {
      const usedMemory = performance.memory.usedJSHeapSize / 1048576;
      const maxMemory = performance.memory.jsHeapSizeLimit / 1048576;
      const memoryPercent = (usedMemory / maxMemory) * 100;
      
      console.log(`Memory: ${usedMemory.toFixed(2)}MB / ${maxMemory.toFixed(2)}MB (${memoryPercent.toFixed(1)}%)`);
      
      // If memory exceeds 70%, trigger garbage collection hint
      if (memoryPercent > 70) {
        if (!memoryWarningShown) {
          console.warn(`⚠️ High memory usage: ${memoryPercent.toFixed(1)}% - Attempting to optimize`);
          memoryWarningShown = true;
        }
        
        // Force garbage collection if available
        if (window.gc) {
          window.gc();
          console.log('🧹 Garbage collection triggered');
        }
        
        // Clear any cached objects that might be holding memory
        if (window.Module && window.Module.canvas) {
          // Reduce canvas resolution temporarily to free memory
          if (window.Module.canvas.width > 800) {
            console.log('Reducing canvas resolution to save memory');
          }
        }
      }
      
      // Critical threshold
      if (memoryPercent > 85) {
        console.error(`🔴 CRITICAL memory: ${memoryPercent.toFixed(1)}% - Please reload or restart the game`);
      }
    }
  }, 5000); // Check every 5 seconds
  
  // Unload the WASM when tab loses focus to free memory
  window.addEventListener('beforeunload', () => {
    if (window.Module) {
      window.Module = null;
    }
  });
  
  // Also try to free memory when tab is hidden
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && window.Module) {
      console.log('Tab hidden - attempting to reduce memory usage');
      if (window.gc) window.gc();
    }
  });
</script>
