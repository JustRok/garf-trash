<script>
  // Memory monitoring and management
  let memoryWarningShown = false;
  let isWasmLoaded = false;
  
  // Monitor memory usage during gameplay
  const memoryMonitor = setInterval(() => {
    if (!isWasmLoaded) return;
    
    if (performance.memory) {
      const usedMemory = performance.memory.usedJSHeapSize / 1048576;
      const maxMemory = performance.memory.jsHeapSizeLimit / 1048576;
      const memoryPercent = (usedMemory / maxMemory) * 100;
      
      console.log(`Memory: ${usedMemory.toFixed(2)}MB / ${maxMemory.toFixed(2)}MB (${memoryPercent.toFixed(1)}%)`);
      
      // If memory exceeds 80% of heap limit, warn user
      if (memoryPercent > 80 && !memoryWarningShown) {
        memoryWarningShown = true;
        console.warn(`⚠️ High memory usage: ${memoryPercent.toFixed(1)}% - Consider reloading the page`);
      }
      
      // If memory exceeds 95%, try emergency cleanup
      if (memoryPercent > 95) {
        console.error(`🔴 Critical memory usage: ${memoryPercent.toFixed(1)}% - Attempting cleanup`);
        if (window.gc) window.gc(); // Only works if browser started with --expose-gc
      }
    }
  }, 10000); // Check every 10 seconds
  
  // Cleanup on page unload
  window.addEventListener('beforeunload', () => {
    clearInterval(memoryMonitor);
    if (window.Module) {
      window.Module = null;
    }
  });
</script>

<body>
    <div id="loading-textt" style="color: black; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;">
        👆 Click anywhere to start the game
    </div>

    <script>
      // Lazy load the WASM bundle only after user interaction
      document.addEventListener('click', () => {
        if (document.getElementById('loading-textt')) {
          document.getElementById('loading-textt').textContent = 'LOADING DOT.NET...';
        }
        
        window.isWasmLoaded = true;
        
        // Dynamically load the bundle.js module
        const script = document.createElement('script');
        script.type = 'module';
        script.src = 'bundle.js';
        script.onerror = () => {
          console.error('Failed to load WASM bundle');
          document.getElementById('loading-textt').textContent = 'Error loading game. Please reload.';
        };
        document.head.appendChild(script);
      }, { once: true });
    </script>
</body>
